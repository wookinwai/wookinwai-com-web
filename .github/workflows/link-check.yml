name: Link check

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: '0 9 * * 1'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  links:
    name: Built-site links
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Check generated HTML
        uses: lycheeverse/lychee-action@v2
        with:
          args: --no-progress --verbose --base ./dist './dist/**/*.html'
          fail: true
